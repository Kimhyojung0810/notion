# 매일 한국 시간 10:00 (UTC 01:00). GitHub Actions cron은 UTC 기준입니다.
name: Notion deadline reminder

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Run reminder
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: node index.js
